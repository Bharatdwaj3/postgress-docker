name: books-library

services:
  db:
    build: 
      context: ./database
      dockerfile: .dockerfile
    container_name: postgres_ctr
    restart: unless-stopped
    
    env_file: 
      - ./database/.env
    ports: 
      - 5012:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  backend:
    build: 
      context: ./backend
      dockerfile: .dockerfile
    container_name: backend_ctr
    restart: unless-stopped
    
    env_file: 
      - ./backend/.env
    ports: 
      - 5013:5013
    networks:
      - app_network
    depends_on:
      - db
 

  firebase:
    build: 
      context: ./firebase
      dockerfile: .dockerfile
    container_name: firebase_ctr
    restart: unless-stopped
    
    env_file: 
      - ./firebase/.env
    ports: 
      - 4000:4000 #UI
      - 9099:9099 #Auth
      - 9199:9199 #Storage
    volumes:
      - firebase_data:/app/firebase-data
    networks:
      - app_network

  frontend:
    build: 
      context: ./frontend
      dockerfile: .dockerfile
    container_name: frontend_ctr
    restart: unless-stopped
    
    env_file: 
      - ./frontend/.env
    ports: 
      - 5014:5014
    networks:
      - app_network
    depends_on:
      - backend
      - db
      - firebase

networks:
  app_network:
    driver: bridge


volumes: 
  postgres_data:
  firebase_data:
